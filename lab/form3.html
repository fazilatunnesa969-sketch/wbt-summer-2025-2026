<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account(form3)</title>
    <link rel="stylesheet" href="form3.css">
</head>

<body>
    <div class="c1">
        <div class="header">
            <h1>Create your account</h1>
            <p>Join us in a couple of steps.</p>
            <hr>
        </div>
        <div class="c1">
            <div class="c2">
                <label for="fullname">Full name</label></br>
                <input type="text" id="fullname" name="fullname" placeholder="name">
            </div>
            <div class="c2">
                <label for="age">Age</label></br>
                <input type="number" id="age" name="age" placeholder="28">
            </div>
            <div class="c2">
                <label for="dob">Date of birth</label></br>
                <input type="date" id="dob" name="dob">
            </div>
            <div class="c2">
                <label for="email">Email address</label></br>
                <input type="email" id="email" name="email" placeholder="name@gmail.com">
            </div>
            <div class="c2">
                <label for="password">Password</label></br>
                <input type="password" id="password" name="password" placeholder="********">
            </div>
            <div class="c2">
                <label>Preferred contact</label></br>
                <input type="radio" id="email_contact" name="contact" checked>
                <label for="email_contact">Email</label>
                <input type="radio" id="phone_contact" name="contact">
                <label for="phone_contact">Phone</label>
                <input type="radio" id="sms_contact" name="contact">
                <label for="sms_contact">SMS</label>
            </div>
            <div class="button"></br>
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </div>
        </div>
    </div>
</body>

</html>
