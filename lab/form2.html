<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="form2.css">
</head>

<body>

    <div class="c1">

        <div class="header">
            <h1>Registration</h1>
            <p>Please complete all fields below.</p>
            <hr>
        </div>

        <div class="f1">

            <div class="f">
                <label for="fullname">Full Name</label><br />
            </div>
            <input type="text" id="fullname" name="fullname" placeholder="Jane Doe">
        </div>

        <div class="f">
            <label for="postalcode">Postal Code</label><br />
            <input type="number" id="postalcode" name="postalcode" placeholder="10001">
        </div>

        <div class="f">
            <label for="dob">Date of Birth</label><br />
            <input type="date" id="dob" name="dob">
        </div>

        <div class="f">
            <label for="email">Email Address</label><br />
            <input type="email" id="email" name="email" placeholder="jane@example.com">
        </div>

        <div class="f">
            <label for="password">Password</label><br />
            <input type="password" id="password" name="password" placeholder="********">
        </div>

        <div class="f">
            <label for="country">Country</label><br />
            <select id="country" name="country">
                <option value="">Select a country...</option>
                <option value="bangladesh">Bangladesh</option>
                <option value="india">India</option>
                <option value="pakistan">Pakistan</option>
                <option value="usa">United States</option>
                <option value="uk">United Kingdom</option>
            </select>
        </div><br />

        <div class="button">
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </div>

    </div>

    </div>

</body>

</html>
